<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>ColorBand</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ColorBand">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <meta name="theme-color" content="#111111">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; background: #f2f2f2; overflow: hidden; user-select: none; touch-action: none; }
  body { display: flex; flex-direction: column; align-items: center; }

  #top-bar {
    width: 100%; max-width: 480px;
    padding: 12px 14px 10px;
    flex-shrink: 0; background: #f2f2f2; z-index: 20;
  }
  #target-pill {
    width: 100%; height: 58px; border-radius: 18px;
    border: 5px solid #111;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px;
    color: rgba(0,0,0,0.45); background: #ddd; transition: background 0.25s;
  }
  #target-pill.pop { animation: pop 0.35s ease; }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.05)} 100%{transform:scale(1)} }

  #game-wrap {
    width: 100%; max-width: 480px; flex: 1;
    position: relative; overflow: hidden; background: #f2f2f2;
  }
  canvas { display: block; position: absolute; top:0; left:0; width:100%; height:100%; }

  #cd {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; background: #f2f2f2;
    transition: opacity 0.3s;
  }
  #cd.hidden { opacity: 0; pointer-events: none; }
  #cd-n {
    font-family: 'Bebas Neue', sans-serif; font-size: 9rem; color: #222; line-height: 1;
  }
  #cd-n.tick { animation: cdtick 0.5s ease; }
  @keyframes cdtick { 0%{transform:scale(1.5);opacity:0.3} 100%{transform:scale(1);opacity:1} }

  .ov {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; z-index: 300; padding: 32px; background: rgba(242,242,242,0.97);
  }
  .ov h1 { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:6px; color:#111; }
  .ov p { font-family:'DM Sans',sans-serif; font-size:0.95rem; text-align:center; max-width:280px; line-height:1.7; color:#666; }
  .ov strong { color:#111; }
  .big-btn {
    padding:14px 52px; background:#111; color:#fff; border:none; border-radius:14px;
    font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:3px; cursor:pointer;
  }
  .stat-row { display:flex; gap:36px; text-align:center; }
  .stat-n { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; line-height:1; color:#111; }
  .stat-l { font-family:'DM Sans',sans-serif; font-size:0.62rem; letter-spacing:3px; color:#aaa; text-transform:uppercase; margin-top:3px; }
  #diff-row { display:flex; gap:10px; }
  .dbtn {
    padding:9px 20px; border-radius:8px; border:3px solid #ddd;
    background:transparent; color:#111;
    font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:2px; cursor:pointer;
  }
  .dbtn.sel { border-color:#06D6A0; background:rgba(6,214,160,0.1); color:#08a87c; }
  .diff-row2 { display:flex; gap:10px; }
  .dbtn2 {
    padding:9px 20px; border-radius:8px; border:3px solid #ddd;
    background:transparent; color:#111;
    font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:2px; cursor:pointer;
  }
  .dbtn2.sel { border-color:#06D6A0; background:rgba(6,214,160,0.1); color:#08a87c; }
  #flash { position:fixed; inset:0; pointer-events:none; z-index:200; opacity:0; }
  #flash.hit { animation: fhit 0.3s ease forwards; background:rgba(100,255,150,0.45); }
  @keyframes fhit { 0%{opacity:1} 100%{opacity:0} }
  #flash.go { animation: fout 0.4s ease forwards; background:rgba(220,30,30,0.3); }
  @keyframes fout { 0%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div id="flash"></div>

<div class="ov" id="scr-start">
  <h1>COLORBAND</h1>
  <p>Los bloques bajan desde arriba.<br>Toca el color indicado.<br>Cada <strong>5 aciertos</strong> cambia el color.<br><strong>Error = Game Over.</strong></p>
  <div>
    <p style="font-family:'DM Sans',sans-serif;font-size:0.62rem;letter-spacing:3px;color:#aaa;text-align:center;margin-bottom:10px;text-transform:uppercase">Velocidad</p>
    <div id="diff-row">
      <button class="dbtn sel" data-s="slow">Lenta</button>
      <button class="dbtn" data-s="normal">Normal</button>
      <button class="dbtn" data-s="fast">Rápida</button>
    </div>
  </div>
  <button class="big-btn" onclick="initAudio();initGame()">JUGAR</button>
</div>

<div class="ov" id="scr-go" style="display:none">
  <p style="font-family:'DM Sans',sans-serif;font-size:0.62rem;letter-spacing:4px;color:#aaa;text-transform:uppercase">¡Fallaste!</p>
  <h1>GAME OVER</h1>
  <div class="stat-row">
    <div><div class="stat-n" id="go-hits">0</div><div class="stat-l">Aciertos</div></div>
    <div><div class="stat-n" id="go-sets">0</div><div class="stat-l">Colores</div></div>
  </div>
  <div style="text-align:center;border-top:2px solid #eee;padding-top:16px;width:100%">
    <div style="font-family:'DM Sans',sans-serif;font-size:0.62rem;letter-spacing:3px;color:#aaa;text-transform:uppercase;margin-bottom:4px">Mejor marca</div>
    <div id="go-best" style="font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:#111;line-height:1"></div>
    <div id="go-new" style="font-family:'DM Sans',sans-serif;font-size:0.8rem;color:#06D6A0;letter-spacing:2px;margin-top:4px;height:1.2em"></div>
  </div>
  <div>
    <p style="font-family:'DM Sans',sans-serif;font-size:0.62rem;letter-spacing:3px;color:#aaa;text-align:center;margin-bottom:10px;text-transform:uppercase">Velocidad</p>
    <div class="diff-row2">
      <button class="dbtn2" data-s="slow" onclick="setSpeed(this)">Lenta</button>
      <button class="dbtn2" data-s="normal" onclick="setSpeed(this)">Normal</button>
      <button class="dbtn2" data-s="fast" onclick="setSpeed(this)">Rápida</button>
    </div>
  </div>
  <button class="big-btn" onclick="initAudio();initGame()">REINTENTAR</button>
</div>

<div id="top-bar">
  <div id="target-pill">—</div>
</div>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="cd"><div id="cd-n">3</div></div>
</div>

<script>
const COLORS = [
  { id:'rosa',     label:'ROSA',     hex:'#FF3EB5' },
  { id:'azul',     label:'AZUL',     hex:'#5BC8F5' },
  { id:'verde',    label:'VERDE',    hex:'#4CD137' },
  { id:'amarillo', label:'AMARILLO', hex:'#FFD23F' },
  { id:'rojo',     label:'ROJO',     hex:'#E84040' },
];

const SEGS = 5;
const HITS_PER_COLOR = 5;
const GAP = 6;
const ROWS_VISIBLE = 4;
const SPEEDS = { slow: 108, normal: 186, fast: 293 };
const SPEED_INCREASE = 0.10;
let currentSpeed = 108;

let speed = 'slow';
let highScore = parseInt(localStorage.getItem('cb_highscore') || '0');
let running = false;
let targetColor = null;
let correctHits = 0, totalHits = 0, totalSets = 0;
let afId = null, lastTs = null;
let rows = [];

let AC = null;
function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq, dur, vol, type) {
  if (!AC) return;
  try {
    if (AC.state === 'suspended') AC.resume();
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g);
    g.connect(AC.destination);
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, AC.currentTime);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
    o.start(AC.currentTime);
    o.stop(AC.currentTime + dur + 0.01);
  } catch(e) {}
}

function playHit() {
  beep(880, 0.10, 1.0, 'square');
  setTimeout(() => beep(1320, 0.10, 0.9, 'square'), 80);
}

function playMiss() {
  beep(180, 0.45, 1.0, 'sawtooth');
  setTimeout(() => beep(120, 0.3, 0.8, 'sawtooth'), 100);
}

const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');
const pillEl   = document.getElementById('target-pill');
const flashEl  = document.getElementById('flash');
const cdEl     = document.getElementById('cd');
const cdNEl    = document.getElementById('cd-n');
const gameWrap = document.getElementById('game-wrap');

let CW, CH, BW, BH, ROW_STEP;

function resize() {
  CW = gameWrap.offsetWidth;
  CH = gameWrap.offsetHeight;
  canvas.width  = CW;
  canvas.height = CH;
  BH       = Math.floor((CH - GAP * (ROWS_VISIBLE + 1)) / ROWS_VISIBLE);
  BW       = (CW - GAP * (SEGS + 1)) / SEGS;
  ROW_STEP = BH + GAP;
}
window.addEventListener('resize', () => resize());

document.querySelectorAll('.dbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.dbtn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    speed = b.dataset.s;
  });
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function makeRow(yPos) {
  const pool = shuffle(COLORS);
  const segs = pool.slice(0, SEGS);
  if (!segs.some(c => c.id === targetColor.id))
    segs[Math.floor(Math.random() * SEGS)] = targetColor;
  return { segs, y: yPos, hit: false };
}

function pickTarget(silent) {
  const opts = COLORS.filter(c => c !== targetColor);
  targetColor = opts[Math.floor(Math.random() * opts.length)];
  correctHits = 0;
  if (!silent) revealPill();
}

function revealPill() {
  pillEl.style.background = targetColor.hex;
  pillEl.textContent = targetColor.label;
  pillEl.classList.remove('pop');
  void pillEl.offsetWidth;
  pillEl.classList.add('pop');
}

function draw() {
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#f2f2f2';
  ctx.fillRect(0, 0, CW, CH);
  for (const row of rows) {
    if (row.y > CH || row.y + BH < 0) continue;
    ctx.globalAlpha = row.hit ? 0.35 : 1.0;
    row.segs.forEach((col, j) => {
      const x = GAP + j * (BW + GAP);
      rr(row.y, x, col.hex);
    });
    ctx.globalAlpha = 1.0;
  }
}

function rr(ry, x, fill) {
  const r = 10, w = BW, h = BH;
  ctx.beginPath();
  ctx.moveTo(x+r,ry); ctx.lineTo(x+w-r,ry); ctx.quadraticCurveTo(x+w,ry,x+w,ry+r);
  ctx.lineTo(x+w,ry+h-r); ctx.quadraticCurveTo(x+w,ry+h,x+w-r,ry+h);
  ctx.lineTo(x+r,ry+h); ctx.quadraticCurveTo(x,ry+h,x,ry+h-r);
  ctx.lineTo(x,ry+r); ctx.quadraticCurveTo(x,ry,x+r,ry);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
}

function loop(ts) {
  if (!running) return;
  if (lastTs === null) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const dy = currentSpeed * dt;

  for (const row of rows) row.y += dy;

  while (rows.length > 0 && rows[rows.length - 1].y > CH) {
    rows.pop();
  }

  const topRow = rows[0];
  if (!topRow || topRow.y >= GAP) {
    const newY = topRow ? topRow.y - ROW_STEP : -BH;
    rows.unshift(makeRow(newY));
  }

  draw();
  afId = requestAnimationFrame(loop);
}

canvas.addEventListener('pointerdown', onTap);

function onTap(e) {
  if (!running) return;
  e.preventDefault();

  const rect = canvas.getBoundingClientRect();
  const tx = (e.clientX - rect.left) * (CW / rect.width);
  const ty = (e.clientY - rect.top)  * (CH / rect.height);

  let hit = null;
  for (const row of rows) {
    if (ty >= row.y && ty < row.y + BH) { hit = row; break; }
  }
  if (!hit) return;

  const j = Math.floor((tx - GAP) / (BW + GAP));
  if (j < 0 || j >= SEGS) return;

  const tapped = hit.segs[j];
  if (tapped.id === targetColor.id) {
    hit.hit = true;
    playHit();
    doFlash('hit');
    correctHits++; totalHits++;
    if (correctHits >= HITS_PER_COLOR) {
      totalSets++;
      currentSpeed = Math.min(currentSpeed * (1 + SPEED_INCREASE), SPEEDS[speed] * 3);
      pickTarget();
    }
  } else {
    playMiss();
    doGameOver();
  }
}

function runCountdown(cb) {
  let n = 3;
  cdNEl.textContent = n;
  cdNEl.classList.remove('tick');
  void cdNEl.offsetWidth;
  cdNEl.classList.add('tick');

  function step() {
    n--;
    if (n <= 0) {
      cdEl.classList.add('hidden');
      cb();
      return;
    }
    cdNEl.classList.remove('tick');
    void cdNEl.offsetWidth;
    cdNEl.textContent = n;
    cdNEl.classList.add('tick');
    setTimeout(step, 800);
  }
  setTimeout(step, 800);
}

function initGame() {
  document.getElementById('scr-start').style.display = 'none';
  document.getElementById('scr-go').style.display    = 'none';

  cancelAnimationFrame(afId);
  running = false;
  resize();

  rows        = [];
  lastTs      = null;
  correctHits = 0;
  totalHits   = 0;
  totalSets   = 0;
  targetColor = null;

  currentSpeed = SPEEDS[speed];
  pickTarget(true);
  pillEl.style.background = '#ddd';
  pillEl.textContent = '—';

  cdEl.classList.remove('hidden');
  cdNEl.textContent = '3';

  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#f2f2f2';
  ctx.fillRect(0, 0, CW, CH);

  rows.push(makeRow(-BH));

  runCountdown(() => {
    revealPill();
    running = true;
    lastTs  = null;
    afId    = requestAnimationFrame(loop);
  });
}

function doFlash(type) {
  flashEl.className = '';
  void flashEl.offsetWidth;
  flashEl.className = type;
}

function setSpeed(btn) {
  document.querySelectorAll('.dbtn2').forEach(x => x.classList.remove('sel'));
  btn.classList.add('sel');
  speed = btn.dataset.s;
  document.querySelectorAll('.dbtn').forEach(x => {
    x.classList.toggle('sel', x.dataset.s === speed);
  });
}

function doGameOver() {
  running = false;
  cancelAnimationFrame(afId);
  doFlash('go');
  setTimeout(() => {
    document.getElementById('go-hits').textContent = totalHits;
    document.getElementById('go-sets').textContent = totalSets;
    const isNew = totalHits > highScore;
    if (isNew) { highScore = totalHits; localStorage.setItem('cb_highscore', highScore); }
    document.getElementById('go-best').textContent = highScore;
    document.getElementById('go-new').textContent = isNew && totalHits > 0 ? '🏆 NUEVO RÉCORD' : '';
    document.querySelectorAll('.dbtn2').forEach(x => {
      x.classList.toggle('sel', x.dataset.s === speed);
    });
    document.getElementById('scr-go').style.display = 'flex';
  }, 430);
}
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
</body>
</html>
